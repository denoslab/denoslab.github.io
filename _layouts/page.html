<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>{{ page.title }} | DENOS Lab</title>
    <meta name="author" content="Steve Drew" />
    <meta name="description" content="{{ page.description | default: 'DENOS Lab at the University of Calgary, led by Dr. Steve Drew.' }}" />
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="{{ page.title }} | DENOS Lab" />
    <meta property="og:description" content="{{ page.description | default: 'DENOS Lab at the University of Calgary, led by Dr. Steve Drew.' }}" />
    <meta property="og:url" content="https://denoslab.com{{ page.url }}" />
    <meta property="og:image" content="https://denoslab.com/images/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="DENOS Lab logo" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://denoslab.com/images/og-image.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ '/dist/css/normalize.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/dist/css/skeleton.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/css/custom.css' | relative_url }}">

    <!-- Favicon -->
    <link rel="icon" href="{{ '/favicon.ico' | relative_url }}" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ '/images/favicon-32x32.png' | relative_url }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ '/images/favicon-16x16.png' | relative_url }}">
    <link rel="apple-touch-icon" href="{{ '/images/apple-touch-icon.png' | relative_url }}">
  </head>

  <body>

    <!-- Sub-page header -->
    <header class="subheader">
      <div class="wrap subheader-inner">
        <a class="subheader-brand" href="{{ '/' | relative_url }}">
          <img src="{{ '/images/denos-logo.png' | relative_url }}" alt="DENOS Lab, University of Calgary">
        </a>
        <a class="subheader-back" href="{{ '/' | relative_url }}">← Back to home</a>
      </div>
    </header>

    <main>
      <section class="section">
        <div class="wrap">
          <div class="section-head">
            <h2 class="section-title">{{ page.title }}</h2>
          </div>
          {{ content }}
        </div>
      </section>
    </main>

    {% include footer.html %}

  </body>
</html>
